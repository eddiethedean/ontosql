name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: ty
        run: ty check

      - name: Pytest with coverage
        run: pytest --cov=ontosql --cov-report=term-missing --cov-fail-under=90

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ontosql_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and Postgres driver
        run: pip install -e ".[dev]" "psycopg[binary]"

      - name: Postgres integration tests (session CRUD)
        env:
          ONTO_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ontosql_test
        run: pytest tests/test_postgres.py -v

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install ".[docs]"

      - name: Build documentation (strict)
        run: mkdocs build --strict

  fastapi-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with fastapi extra only
        run: pip install -e ".[fastapi]" pytest httpx

      - name: Verify fastapi subpackage imports
        run: python -c "from ontosql.fastapi import negotiate_onto_response; print('ok')"

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            exit 1
          fi
          echo "Version OK: ${TAG_VERSION}"

      - name: Verify CHANGELOG has release section
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qF "## [${TAG_VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing ## [${TAG_VERSION}] section"
            exit 1
          fi
          echo "CHANGELOG OK: ## [${TAG_VERSION}]"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: ty
        run: ty check

      - name: Pytest with coverage
        run: pytest --cov=ontosql --cov-fail-under=90

      - name: Build documentation (strict)
        run: |
          pip install ".[docs]"
          mkdocs build --strict

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ontosql_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and Postgres driver
        run: pip install -e ".[dev]" "psycopg[binary]"

      - name: Postgres integration tests (session CRUD)
        env:
          ONTO_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ontosql_test
        run: pytest tests/test_postgres.py -v

  publish:
    needs: [checks, postgres]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Smoke-test wheel
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          pip install dist/ontosql-*.whl
          python -c "import ontosql; v='${TAG_VERSION#v}'; assert ontosql.__version__ == v, (ontosql.__version__, v)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

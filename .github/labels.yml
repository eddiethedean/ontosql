# Suggested labels for maintainers (create via GitHub Settings or `gh label create`).
# Used by contributors to find approachable work.

- name: good first issue
  color: "7057ff"
  description: Good for newcomers; docs or small isolated changes

- name: documentation
  color: "0075ca"
  description: README, guides, examples, or MkDocs

- name: bug
  color: "d73a4a"
  description: Incorrect behavior or regression

- name: enhancement
  color: "a2eeef"
  description: New feature or API improvement

site_name: OntoSQL
site_description: Semantic data access for SQL — map ontology-shaped models onto real schemas with explicit OntoMapper bindings
# RTD sets READTHEDOCS_CANONICAL_URL; GitHub Pages uses the fallback.
site_url: !ENV [READTHEDOCS_CANONICAL_URL, 'https://eddiethedean.github.io/ontosql/']
repo_url: https://github.com/eddiethedean/ontosql
repo_name: eddiethedean/ontosql
edit_uri: edit/main/docs/
copyright: Copyright &copy; OntoSQL contributors

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - toc.follow
    - toc.integrate

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eddiethedean/ontosql
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ontosql/

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn

exclude_docs: |
  PLAN.md

nav:
  - Home: index.md
  - Getting started:
      - Start here: guides/start-here.md
      - Installation: getting-started/installation.md
      - Quick start: getting-started/quickstart.md
      - Async sessions: getting-started/async.md
  - Guides:
      - Cascade policies: guides/cascade-policies.md
      - Bridge tables: guides/bridge-tables.md
      - Multi-map views: guides/multi-map-views.md
      - Postgres dialect: guides/postgres-dialect.md
      - Production FastAPI: guides/production-router.md
      - Hybrid SQL + graph: HYBRID.md
  - Reference:
      - Architecture: ARCHITECTURE.md
      - Technical specification: SPECS.md
      - Ecosystem: ECOSYSTEM.md
      - Session lifecycle (internals): internals/session-lifecycle.md
      - Compatibility: COMPATIBILITY.md
      - Security: SECURITY.md
      - Dependencies: DEPS.md
  - Help:
      - FAQ: FAQ.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Project:
      - Roadmap: ROADMAP.md
      - Changelog: changelog.md
      - Contributing: contributing.md
      - Code of Conduct: code_of_conduct.md
      - Releasing: RELEASING.md
